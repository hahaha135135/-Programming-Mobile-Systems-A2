<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inventory Manager - Part 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Inventory Management System</h1>
        </header>

        <section class="form-section">
            <h2>Add / Edit Item</h2>
            <form id="itemForm">
                <div class="form-grid">
                    <input type="number" id="itemId" placeholder="Item ID (Unique)" required>
                    <input type="text" id="itemName" placeholder="Item Name" required>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Tools">Tools</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                    <input type="number" id="quantity" placeholder="Quantity" required>
                    <input type="number" step="0.01" id="price" placeholder="Price" required>
                    <input type="text" id="supplier" placeholder="Supplier Name" required>
                    <select id="stockStatus" required>
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                    <select id="popular" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                    <input type="text" id="comment" placeholder="Comment (Optional)">
                </div>
                <div class="button-group">
                    <button type="button" id="addBtn">Add Item</button>
                    <button type="button" id="updateBtn">Update Item</button>
                </div>
            </form>
        </section>

        <section class="action-section">
            <button id="showAllBtn">Show All Items</button>
        </section>

        <section class="display-section">
            <h2>Inventory List</h2>
            <div id="messageArea" class="message-area"></div>
            <div id="inventoryList" class="inventory-list">
                <p>No items to display. Add some items above.</p>
            </div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
